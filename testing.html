<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Image Change</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  padding: 60px;
}

.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 80px;
}

/* LEFT SECTION */
.projects {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.project {
  padding: 20px 30px;
  border: 1px solid #444;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 300px;
}

.project:hover {
  background: white;
  color: black;
}

/* RIGHT SECTION */
.preview-section {
  width: 500px;
  height: 350px;
}

#box-image-showcase {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  transition: opacity 0.25s ease;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <section class="projects">

    <div href="https://www.linkedin.com/in/rory-maddren/" data-image="/images/landing-page/photo-of-me.jpg" class="hover-image-appear awards-splitter-container-minus-one">
      Project One
    </div>

    <div href="https://www.linkedin.com/in/rory-maddren/" data-image="/images/generic/Dearna-icon.png" class="hover-image-appear awards-splitter-container-minus-one">
      Project Two
    </div>

    <div href="https://www.linkedin.com/in/rory-maddren/" data-image="/images/landing-page/photo-of-me.jpg" class="hover-image-appear awards-splitter-container-minus-one">
      Project Three
    </div>

  </section>

  <!-- RIGHT SIDE -->
  <div id="photo-section" class="preview-section">
    <img 
      id="box-image-showcase" 
      src="https://picsum.photos/id/1015/800/600"
      alt="Preview Image"
    >
  </div>

</div>

<script>
const hoverImageAppear = document.querySelectorAll('.hover-image-appear');
const boxImageShowcase = document.querySelector('#box-image-showcase');

hoverImageAppear.forEach(hoverImageAppear => {
  hoverImageAppear.addEventListener('mouseenter', () => {
    boxImageShowcase.style.opacity = '0';

    setTimeout(() => {
      boxImageShowcase.src = hoverImageAppear.dataset.image;
      boxImageShowcase.style.opacity = '1';
    }, 150);
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
  .work-switch {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .switch-btn {
    padding: 12px 20px;
    border: 1px solid #333;
    background: white;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .switch-btn.active {
    background: #333;
    color: white;
  }

  .content-wrapper {
    position: relative;
  }

  .content-panel {
    display: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .content-panel.active {
    display: block;
    opacity: 1;
  }
</style>
</head>

<body>

<div class="work-switch">
  <button class="switch-btn active" id="uni-btn">
    Uni Work
  </button>

  <button class="switch-btn" id="industry-btn">
    Ind Work
  </button>
</div>

<section class="content-wrapper">

  <div class="content-panel active" id="uni-works">
    <h1>Uni Work</h1>
    <p>This is the university section.</p>
  </div>

  <div class="content-panel" id="work-section-industry">
    <h1>Industry Work</h1>
    <p>This is the industry section.</p>
  </div>

</section>

<script>
  const uniBtn = document.querySelector('#uni-btn');
  const industryBtn = document.querySelector('#industry-btn');

  const uniWorks = document.querySelector('#uni-works');
  const industryWorks = document.querySelector('#work-section-industry');

  // Show Uni Work
  uniBtn.addEventListener('click', () => {
    uniWorks.classList.add('active');
    industryWorks.classList.remove('active');

    uniBtn.classList.add('active');
    industryBtn.classList.remove('active');
  });

  // Show Industry Work
  industryBtn.addEventListener('click', () => {
    industryWorks.classList.add('active');
    uniWorks.classList.remove('active');

    industryBtn.classList.add('active');
    uniBtn.classList.remove('active');
  });
</script>

</body>
</html>

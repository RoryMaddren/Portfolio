<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Image Change</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  padding: 60px;
}

.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 80px;
}

/* LEFT SECTION */
.projects {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.project {
  padding: 20px 30px;
  border: 1px solid #444;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 300px;
}

.project:hover {
  background: white;
  color: black;
}

/* RIGHT SECTION */
.preview-section {
  width: 500px;
  height: 350px;
}

#preview-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  transition: opacity 0.25s ease;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <section class="projects">

    <div class="project" data-image="https://picsum.photos/id/1015/800/600">
      Project One
    </div>

    <div class="project" data-image="https://picsum.photos/id/1016/800/600">
      Project Two
    </div>

    <div class="project" data-image="https://picsum.photos/id/1018/800/600">
      Project Three
    </div>

  </section>

  <!-- RIGHT SIDE -->
  <section class="preview-section">
    <img 
      id="preview-image" 
      src="https://picsum.photos/id/1015/800/600"
      alt="Preview Image"
    >
  </section>

</div>

<script>
const projects = document.querySelectorAll('.project');
const previewImage = document.querySelector('#preview-image');

projects.forEach(project => {
  project.addEventListener('mouseenter', () => {
    previewImage.style.opacity = '0';

    setTimeout(() => {
      previewImage.src = project.dataset.image;
      previewImage.style.opacity = '1';
    }, 150);
  });
});
</script>

</body>
</html>

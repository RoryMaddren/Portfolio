<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #0b0b0b, #000);
    font-family: "Inter", sans-serif;
    user-select: none;
    color: white;
  }

  .viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  .scene {
    width: 100%;
    height: 100%;
    position: relative;
    will-change: transform;
  }

  .grid {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 3000px;
    height: 2000px;
    transform: translate(-50%, -50%);
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .photo {
    position: absolute;
    width: 200px;
    height: 130px;
    background-size: cover;
    background-position: center;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
    opacity: 1;
    cursor: pointer;
    z-index: 2;
    transition: transform 0.3s ease-out, opacity 0.3s ease;
  }

  .photo:hover {
    transform: scale(1.1);
    z-index: 10;
  }

  /* Zoom Bar Styling */
  #zoomBarContainer {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 9001;
  }

  #zoomBar {
    width: 100%;
    -webkit-appearance: none;
    background: rgba(255, 255, 255, 0.2);
    height: 2px;
    border-radius: 0px;
    cursor: pointer;
  }

  #zoomBar::-webkit-slider-thumb,
  #zoomBar::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: #fff 1px solid;
    background: #000000;
    cursor: pointer;
  }

  /* Overlay Styles */
  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 10000;
    flex-direction: column;
  }

  #overlay img {
    max-width: 80%;
    max-height: 70%;
    border-radius: 8px;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
  }

  #overlay p {
    margin-top: 20px;
    font-size: 24px;
    color: #fff;
    text-align: center;
  }

  #overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  * { cursor: pointer; }
</style>

<body>
<div class="viewport">
  <div class="scene" id="scene">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Zoom Bar -->
<div id="zoomBarContainer">
  <span style="font-size:1.1rem;">Zoom Out</span>
  <input type="range" id="zoomBar" min="0.5" max="3" step="0.01" value="1">
  <span style="font-size:1.1rem;">Zoom In</span>
</div>

<!-- Overlay -->
<div id="overlay">
  <img id="overlay-img" src="">
  <p id="overlay-text">Example Caption</p>
</div>

<script>
  const scene = document.getElementById("scene");
  const photoCount = 40;

  const gridCols = 8;
  const gridRows = 5;
  const gridWidth = 3000;
  const gridHeight = 2000;
  const cellWidth = gridWidth / (gridCols - 1);
  const cellHeight = gridHeight / (gridRows - 1);

  // --- Add photos with chaotic positions and depth ---
  const photos = [];
  for (let i = 0; i < photoCount; i++) {
    const photo = document.createElement("div");
    photo.className = "photo";
    photo.style.backgroundImage = `url('https://picsum.photos/400?random=${i}')`;
    photo.dataset.caption = "Image " + (i + 1);

    const col = i % gridCols;
    const row = Math.floor(i / gridCols);

    // base grid position
    const baseX = -gridWidth / 2 + col * cellWidth - 100;
    const baseY = -gridHeight / 2 + row * cellHeight - 65;

    // chaotic/random offset
    const offsetX = (Math.random() - 0.5) * 150;
    const offsetY = (Math.random() - 0.5) * 100;

    // depth for parallax: 0.5 (far) to 2 (close)
    const zDepth = 0.5 + Math.random() * 1.5;
    photo.dataset.z = zDepth;

    // initial scale based on depth
    photo.style.transform = `scale(${zDepth})`;

    // store base position in dataset
    photo.dataset.baseX = baseX + offsetX;
    photo.dataset.baseY = baseY + offsetY;

    scene.appendChild(photo);
    photos.push(photo);
  }

  // --- Movement state ---
  let isDragging = false;
  let startX, startY;
  let translateX = 0, translateY = 0;
  let targetX = 0, targetY = 0;
  let velocityX = 0, velocityY = 0;
  let scale = 1;

  const zoomBar = document.getElementById("zoomBar");

  // --- Animate loop with parallax ---
  function animate() {
    if (!isDragging) {
      translateX += velocityX;
      translateY += velocityY;
      velocityX *= 0.92;
      velocityY *= 0.92;
    } else {
      const dx = targetX - translateX;
      const dy = targetY - translateY;
      velocityX = dx * 0.1;
      velocityY = dy * 0.1;
      translateX += velocityX;
      translateY += velocityY;
    }

    const time = Date.now();

    // update each photo with parallax
    photos.forEach(photo => {
      const z = parseFloat(photo.dataset.z);
      const baseX = parseFloat(photo.dataset.baseX);
      const baseY = parseFloat(photo.dataset.baseY);

      // parallax offset scales inversely with depth
      const parallaxX = translateX * (z - 0.5);
      const parallaxY = translateY * (z - 0.5);

      // subtle floating wave per photo
      const waveX = Math.sin(time * 0.0003 + z) * 8 * z;
      const waveY = Math.cos(time * 0.0004 + z) * 8 * z;

      photo.style.left = `calc(50% + ${baseX + parallaxX}px)`;
      photo.style.top = `calc(50% + ${baseY + parallaxY}px)`;
      photo.style.transform = `scale(${z}) translate(${waveX}px, ${waveY}px)`;
      photo.style.zIndex = Math.floor(z * 1000); // closer images appear on top
    });

    scene.style.transform = `scale(${scale})`;

    requestAnimationFrame(animate);
  }
  animate();

  // --- Dragging ---
  window.addEventListener("mousedown", (e) => {
    isDragging = true;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
  });

  window.addEventListener("mouseup", () => isDragging = false);

  window.addEventListener("mousemove", (e) => {
    if (!isDragging) return;
    targetX = e.clientX - startX;
    targetY = e.clientY - startY;
  });

  // --- Scroll Zoom ---
  window.addEventListener("wheel", (e) => {
    const zoomFactor = -e.deltaY * 0.0015;
    scale += zoomFactor;
    if (scale < 0.5) scale = 0.5;
    if (scale > 3) scale = 3;
    zoomBar.value = scale.toFixed(2);
  });

  // --- Zoom bar ---
  zoomBar.addEventListener("input", (e) => {
    scale = parseFloat(e.target.value);
  });

  // --- Overlay ---
  const overlay = document.getElementById('overlay');
  const overlayImg = document.getElementById('overlay-img');
  const overlayText = document.getElementById('overlay-text');

  photos.forEach(photo => {
    photo.addEventListener('click', (e) => {
      e.stopPropagation();
      overlayImg.src = photo.style.backgroundImage.slice(5, -2);
      overlayText.textContent = photo.dataset.caption;
      overlay.classList.add('show');
    });
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('show');
  });
</script>
</body>
